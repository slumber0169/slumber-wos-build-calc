<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>領主装備計算シミュレーター</title>

<style>

body{
font-family:"Segoe UI",sans-serif;
background:#111927;
color:#e8f4ff;
margin:0;
}

h1{
text-align:center;
padding:20px;
background:#1b2b40;
margin:0 0 10px 0;
border-bottom:1px solid #3a516b;
}

.container{
width:95%;
max-width:1100px;
margin:auto;
}

.card{
background:#1a2332;
margin:12px 0;
padding:18px;
border-radius:10px;
border:1px solid #32465f;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #3b4f66;
padding:6px;
text-align:center;
}

th{
background:#23344a;
}

select{
background:#0e1724;
color:#d6edff;
border:1px solid #3d5977;
padding:6px;
border-radius:6px;
}

button{
width:100%;
background:#3fa9ff;
color:black;
font-size:18px;
padding:12px;
border:none;
border-radius:8px;
margin:15px 0;
cursor:pointer;
}

button:hover{
background:#6ac2ff;
}

.spear{color:#6fd3ff;}
.shield{color:#8dff8d;}
.bow{color:#ffb366;}

.result{
font-size:18px;
line-height:1.7;
}

</style>
</head>

<body>

<h1>領主装備計算シミュレーター</h1>

<div class="container">

<div class="card">

<table>

<tr>
<th>装備</th>
<th colspan="3">現在</th>
<th>→</th>
<th colspan="3">目標</th>
</tr>

<tr>
<th></th>
<th>レア</th>
<th>Tier</th>
<th>星</th>
<th></th>
<th>レア</th>
<th>Tier</th>
<th>星</th>
</tr>

<tbody id="gearTable"></tbody>

</table>

</div>

<div class="card">

<button onclick="calc()">素材計算</button>

<div class="result" id="result"></div>

</div>

</div>

<script>

const order=[
["グッド",0,0,1500,15,0,0],
["グッド",0,1,3800,40,0,0],

["レア",0,0,7000,70,0,0],
["レア",0,1,9700,95,0,0],
["レア",0,2,0,0,45,0],
["レア",0,3,0,0,50,0],

["エピック",0,0,0,0,60,0],
["エピック",0,1,0,0,70,0],
["エピック",0,2,6500,65,40,0],
["エピック",0,3,8000,80,50,0],

["エピック",1,0,10000,95,60,0],
["エピック",1,1,11000,110,70,0],
["エピック",1,2,13000,130,85,0],
["エピック",1,3,15000,160,100,0],

["レジェンド",0,0,22000,220,40,0],
["レジェンド",0,1,23000,230,40,0],
["レジェンド",0,2,25000,250,45,0],
["レジェンド",0,3,26000,260,45,0],

["レジェンド",1,0,28000,280,45,0],
["レジェンド",1,1,30000,300,55,0],
["レジェンド",1,2,32000,320,55,0],
["レジェンド",1,3,35000,340,55,0],

["レジェンド",2,0,38000,360,55,0],
["レジェンド",2,1,43000,430,75,0],
["レジェンド",2,2,45000,460,80,0],
["レジェンド",2,3,48000,500,85,0],

["神話",0,0,50000,530,85,10],
["神話",0,1,52000,560,90,10],
["神話",0,2,54000,590,95,10],
["神話",0,3,56000,620,100,10],

["神話",1,0,59000,670,110,15],
["神話",1,1,61000,700,115,15],
["神話",1,2,63000,730,120,15],
["神話",1,3,65000,760,125,15],

["神話",2,0,68000,810,135,20],
["神話",2,1,70000,840,140,20],
["神話",2,2,72000,870,145,20],
["神話",2,3,74000,900,150,20],

["神話",3,0,77000,950,160,25],
["神話",3,1,80000,990,165,25],
["神話",3,2,83000,1030,170,25],
["神話",3,3,86000,1070,180,25]
]

const rarity=["未強化","グッド","レア","エピック","レジェンド","神話"]

const names=[
["帽子","spear"],
["時計","spear"],
["コート","shield"],
["ズボン","shield"],
["指輪","bow"],
["杖","bow"]
]

let html=""

names.forEach((n,i)=>{

html+=`
<tr class="${n[1]}">
<td>${n[0]}</td>

<td><select id="cr${i}"></select></td>
<td><select id="ct${i}"></select></td>
<td><select id="cs${i}"></select></td>

<td>→</td>

<td><select id="tr${i}"></select></td>
<td><select id="tt${i}"></select></td>
<td><select id="ts${i}"></select></td>
</tr>
`

})

document.getElementById("gearTable").innerHTML=html

function fill(){

document.querySelectorAll("select").forEach(s=>{

if(s.id.includes("r")){

rarity.forEach(r=>{
let o=document.createElement("option")
o.value=r
o.text=r
s.appendChild(o)
})

}

if(s.id.includes("t")){

for(let i=0;i<=3;i++){
let o=document.createElement("option")
o.value=i
o.text=i
s.appendChild(o)
}

}

if(s.id.includes("s")){

for(let i=0;i<=3;i++){
let o=document.createElement("option")
o.value=i
o.text=i
s.appendChild(o)
}

}

})

}

fill()

function findIndex(r,t,s){

for(let i=0;i<order.length;i++){

if(order[i][0]==r && order[i][1]==t && order[i][2]==s){
return i
}

}

return -1

}

function calc(){

let alloy=0
let polish=0
let blueprint=0
let amber=0

for(let i=0;i<6;i++){

let cr=document.getElementById("cr"+i).value
let ct=document.getElementById("ct"+i).value
let cs=document.getElementById("cs"+i).value

let tr=document.getElementById("tr"+i).value
let tt=document.getElementById("tt"+i).value
let ts=document.getElementById("ts"+i).value

let start=findIndex(cr,ct,cs)
let end=findIndex(tr,tt,ts)

for(let j=start+1;j<=end;j++){

let v=order[j]

alloy+=v[3]
polish+=v[4]
blueprint+=v[5]
amber+=v[6]

}

}

document.getElementById("result").innerHTML=`

合金 : ${alloy}<br>
研磨剤 : ${polish}<br>
図面 : ${blueprint}<br>
琥珀 : ${amber}

`

}

</script>

</body>
</html>
